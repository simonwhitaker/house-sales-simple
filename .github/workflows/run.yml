name: Get latest data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 1 * *" # Run at 4am UTC on the first of the month

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install the uv project
        run: uv sync --locked --all-extras --dev

      - name: Get latest data
        run: uv run python main.py

      - name: Delete old markdown reports (keep last 6)
        run: |
          ls -1 reports/*.md 2>/dev/null | sort | head -n -6 | xargs -r rm

      - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10
