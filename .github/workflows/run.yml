name: Get latest data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 1 * *" # Run at 4am UTC on the first of the month

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install the uv project
        run: uv sync --locked --all-extras --dev

      - name: Get latest data
        run: uv run python main.py

      - name: Delete old markdown reports (keep last 6)
        run: |
          ls -1 reports/*.md 2>/dev/null | sort | head -n -6 | xargs -r rm

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data docs reports

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update latest data"
          auth_header="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "HEAD:${GITHUB_REF_NAME}"
